<!DOCTYPE html>
<html>

<head>
    <style>
        header,
        section,
        aside,
        footer {
            background-color: #ccc;

        }

        article {
            background-color: #888;
        }

        .container {
            display: flex;
            flex: 8;
        }

        section {
            flex: 7;
            order: 2;
        }

        aside {
            flex: 3;
            order: 1;
        }

        p {
            text-align: center;
        }

        html,
        body {
            margin: 0;
            height: 100%;
            overflow-y: hidden;
        }

        .container-v {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        header,
        footer {
            flex: 1;
        }
    </style>
</head>

<body>
    <div class="container-v">
        <header>
            <p> Header </p>
        </header>
        <div class="container">
            <section>
                <p> Section </p>
                <article>
                    <p> Article </p>
                </article>
            </section>
            <aside>
                <p> Aside </p>
            </aside>
        </div>
        <footer>
            <p> Footer </p>
        </footer>
    </div>
</body>

</html>
